experiment_name: bendr_p300_random_init_synthetic_smoke
output_dir: runs

dataset:
  source: synthetic
  name: BNCI2014_008
  paradigm: p300
  subjects: [1]
  data_dir: data/moabb
  fmin: 1.0
  fmax: 40.0
  tmin: 0.0
  tmax: 1.0
  resample: 256.0
  standardize: trial
  synthetic_trials: 96
  synthetic_channels: 8
  synthetic_times: 256
  synthetic_classes: 2

model:
  name: bendr
  framework: torch
  external:
    repo_path: ${BENDR_REPO}
    module: eegworkbench.adapters.bendr
    factory: build_classifier
    checkpoint: null
    strict: false
    kwargs:
      architecture: bendr
      random_init: true
      model_kwargs:
        encoder_h: 512
        contextualizer_hidden: 3076
        dropout: 0.1

training:
  epochs: 1
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.0001
  class_weight: balanced
  valid_size: 0.15
  test_size: 0.20
  seed: 42
  patience: 1
  num_workers: 0
  device: auto
  amp: true

